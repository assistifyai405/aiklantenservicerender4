<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; }
    button { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 0.5rem; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #1d4ed8; }
    .error { color: #dc2626; margin-top: 0.5rem; font-size: 0.875rem; }
    .link { text-align: center; margin-top: 1rem; }
    .link a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Inloggen</h1>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" name="password" required>
      </div>
      <div id="error" class="error"></div>
      <button type="submit">Inloggen</button>
    </form>
    <div class="link">
      Nog geen account? <a href="/register">Registreer</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: formData.get('email'), password: formData.get('password') })
      });
      if (res.ok) window.location = '/dashboard';
      else document.getElementById('error').textContent = 'Ongeldige inloggegevens';
    });
  </script>
</body>
</html>
